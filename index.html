<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>おたく場ギルド</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <audio id="bgm" src="audio/bgm.mp3" loop preload="auto"></audio>
  <audio id="seCursor" src="audio/cursor.mp3" preload="auto"></audio>
  <audio id="seDecide" src="audio/decide.mp3" preload="auto"></audio>
  <audio id="seClear" src="audio/clear.mp3" preload="auto"></audio>

  <main id="app">
    <section class="screen screen-title active" id="titleScreen">
      <div class="rpg-window title-window">
        <h1>おたく場ギルド</h1>
        <p id="titleMessage">メニューを開きますか？</p>
        <div class="choice-list">
          <button class="choice selected" data-action="yes">▶ はい</button>
          <button class="choice" data-action="no">　いいえ</button>
        </div>
      </div>
    </section>

    <section class="screen screen-register" id="registerScreen">
      <div class="rpg-window register-window">
        <h2>冒険者登録</h2>
        <p>冒険者名を入力してください</p>
        <input id="nameInput" maxlength="18" autocomplete="nickname" placeholder="例：ハヤテ">
        <button id="registerButton" class="main-button">▶ 登録する</button>
      </div>
    </section>

    <section class="screen screen-welcome" id="welcomeScreen">
      <div class="rpg-window welcome-window">
        <p id="welcomeText">おかえり！</p>
        <button id="openMenuButton" class="main-button">▶ メニューを開く</button>
      </div>
    </section>

    <section class="screen screen-menu" id="menuScreen">
      <div class="battle-bg"></div>
      <div class="top-label">おたく場ギルド</div>
      <div class="battle-space" aria-hidden="true"></div>
      <div class="command-window">
        <div class="status-line">
          <span id="playerName">冒険者</span>
          <span>メニュー選択</span>
        </div>
        <div class="command-grid" id="categoryGrid"></div>
      </div>
    </section>

    <section class="screen screen-category" id="categoryScreen">
      <div class="battle-bg"></div>
      <div class="top-label" id="categoryTitle">メニュー</div>
      <div class="list-panel">
        <button id="backToCategories" class="back-button">◀ 戻る</button>
        <div id="itemList" class="item-list"></div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
