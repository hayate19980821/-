<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>おたく場ギルド</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<main id="app">

  <section class="screen active" id="titleScreen">
    <div class="window">
      <h1>おたく場ギルド</h1>
      <p id="titleText">メニューを開きますか？</p>
      <button onclick="start()">▶ はい</button>
      <button onclick="refuse()">　いいえ</button>
    </div>
  </section>

  <section class="screen" id="nameScreen">
    <div class="window">
      <h2>冒険者登録</h2>
      <p>冒険者名を入力してください</p>
      <input id="nameInput" placeholder="例：ハヤテ">
      <button onclick="saveName()">▶ 登録する</button>
    </div>
  </section>

  <section class="screen" id="welcomeScreen">
    <div class="window">
      <p id="welcomeText">おかえり！</p>
      <button onclick="openMenu()">▶ メニューを開く</button>
    </div>
  </section>

  <section class="screen game" id="menuScreen">
    <div class="battle">
      <div class="guild-title">おたく場ギルド</div>
      <div class="monster m1">🟢</div>
      <div class="monster m2">👺</div>
      <div class="monster m3">🐗</div>
    </div>

    <div class="command">
      <div class="status">
        <span id="playerName">冒険者</span>
        <span id="modeText">メニュー選択</span>
      </div>
      <div id="content"></div>
    </div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
